!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pie Chart - Customer Churn System</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="layout-root">

  <div class="sidebar">
    <div>
      <div class="sidebar-header">
        <div class="logo-circle">C</div>
        <div>
          <div class="logo-text">Churn Tracker</div>
          <div class="logo-sub">Predicting Customer Churn</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link" id="nav-dashboard"><span class="icon">📋</span><span>Dashboard</span></a>
        <a href="chart.html" class="nav-link" id="nav-chart"><span class="icon">🍩</span><span>Pie Chart</span></a>
        <a href="records.html" class="nav-link" id="nav-records"><span class="icon">📁</span><span>Records</span></a>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <main class="main-content">
    <div class="glass-panel">
      <h2>Churn Pie Chart</h2>
      <p class="subtitle">Lost (Red), Acquired (Blue), Remaining (Green) for the latest saved period.</p>
      <div class="chart-container">
        <canvas id="pieChart"></canvas>
        <div id="noDataMsg" class="msg"></div>
        <pre id="legendText" style="white-space:pre-wrap;margin-top:10px;"></pre>
      </div>
    </div>
  </main>
</div>
<script src="auth.js"></script>
<script src="main.js"></script>
<script>
  setActiveNav('chart');
  requireLogin();
</script>
</body>
</html>
